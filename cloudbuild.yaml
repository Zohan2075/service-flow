steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/github.com/zohan2075/service-flow:$COMMIT_SHA'
      - '.'
      - '-f'
      - Dockerfile
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - service-flow-api
      - '--image=gcr.io/$PROJECT_ID/github.com/zohan2075/service-flow:$COMMIT_SHA'
      - '--region=northamerica-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
images:
  - 'gcr.io/$PROJECT_ID/github.com/zohan2075/service-flow:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
