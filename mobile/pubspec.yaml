name: serviceflow
description: ServiceFlow — Mobile service time tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0
  retrofit: ^4.4.1

  # Auth
  google_sign_in: ^6.2.2
  flutter_secure_storage: ^9.2.2

  # Local DB (Room-like offline cache)
  drift: ^2.22.1
  drift_flutter: ^0.2.3
  sqlite3_flutter_libs: ^0.5.29

  # Storage
  shared_preferences: ^2.3.4

  # UI
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  table_calendar: ^3.1.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  retrofit_generator: ^9.1.5
  drift_dev: ^2.22.1
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/
